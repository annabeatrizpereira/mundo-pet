<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundo Pet</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="./assets/icons/pet-paw.svg"
      type="image/svg"
    />
    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <header>
      <div>
        <img src="./assets/icons/favicon.svg" alt="dog icon" />
        <h2>Mundo pet</h2>
      </div>
    </header>

    <main>
      <section id="header">
        <div>
          <h1>Sua agenda</h1>
          <p>
            Aqui você pode ver todos os clientes e serviços agendados para hoje.
          </p>
        </div>

        <div>
          <img src="./assets/icons/calendar.svg" alt="calendar icon" />
          <input type="date" name="" id="" />
        </div>
      </section>

      <section id="appointments">
        <div class="morning period">
          <div class="period-header">
            <img src="./assets/icons/sun-fog.svg" alt="sun fog icon" />
            <h3>Manhã</h3>

            <p>09h-12h</p>
          </div>

          <!-- <div class="period-appointments">
            <div class="appointment">
              <div>
                <p class="time">13:00</p>
                <p class="pet-name">Mel</p>
                <span>/</span>
                <span class="person-name">João Souza</span>
              </div>
              <span class="description">Corte de Unhas</span>
              <a>Remover agendamento</a>
            </div>
          </div> -->

          <div class="no-appointments">
            <span>Nenhum agendamento.</span>
          </div>
        </div>

        <div class="afternoon period">
          <div class="period-header">
            <img src="./assets/icons/cloud-sun.svg" alt="sun fog icon" />
            <h3>Tarde</h3>

            <p>13h-18h</p>
          </div>

          <div class="no-appointments">
            <span>Nenhum agendamento.</span>
          </div>
        </div>

        <div class="night period">
          <div class="period-header">
            <img src="./assets/icons/moon.svg" alt="sun fog icon" />
            <h3>Noite</h3>

            <p>19h-21h</p>
          </div>

          <div class="no-appointments">
            <span>Nenhum agendamento.</span>
          </div>
        </div>
      </section>
    </main>

    <div id="modal" class="hidden">
      <div class="modal-content">
        <button type="button" id="close-modal">
          <img
            src="./assets/icons/close.svg"
            alt="close icon"
            title="close modal"
          />
        </button>

        <section>
          <h2>Agende um atendimento</h2>
          <p>Preencha os dados do cliente para realizar o agendamento:</p>
        </section>

        <form action="">
          <fieldset>
            <label for="tutor-name">
              <p>Nome do tutor</p>
              <div>
                <input
                  type="text"
                  placeholder="Helena Souza"
                  name="tutor-name"
                  id="tutor-name"
                />
                <img src="./assets/icons/user.svg" alt="user icon" />
              </div>
            </label>

            <label for="pet-name">
              <p>Nome do pet</p>
              <div>
                <input
                  type="text"
                  placeholder="Cheddar"
                  name="pet-name"
                  id="pet-name"
                />
                <img src="./assets/icons/pet-paw.svg" alt="dog paw icon" />
              </div>
            </label>

            <label for="tel">
              <p>Telefone</p>
              <div>
                <input
                  type="tel"
                  placeholder="(00) 0 0000-0000"
                  name="tel"
                  id="telephone"
                />
                <img src="./assets/icons/phone.svg" alt="phone icon" />
              </div>
            </label>

            <label for="description">
              <p>Descrição do serviço</p>
              <textarea
                placeholder="Banho e tosa"
                name="description"
                id="description"
              ></textarea>
            </label>

            <div>
              <label for="date">
                <p>Data</p>
                <div>
                  <input
                    type="date"
                    placeholder="10/01/2025"
                    name="date"
                    id="date"
                  />
                  <img src="./assets/icons/calendar.svg" alt="calendar icon" />
                </div>
              </label>

              <label for="hour">
                <p>Hora</p>
                <div>
                  <input
                    type="time"
                    placeholder="12:00"
                    name="hour"
                    id="hour"
                  />
                  <img src="./assets/icons/clock.svg" alt="clock icon" />
                </div>
              </label>
            </div>
          </fieldset>

          <button type="submit" class="btn-purple">Agendar</button>
        </form>
      </div>
    </div>

    <footer>
      <button class="btn-purple" id="open-modal">Novo agendamento</button>
    </footer>

    <script src="./scripts.js"></script>
  </body>
</html>
